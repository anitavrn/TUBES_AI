<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <h1>SSC Virtual Assistant</h1>
            <p>Layanan Informasi Akademik Student Service Center</p>
        </div>

        <div id="chatBox" class="chat-box">
            <div class="message bot">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    Halo! Kamu bisa bertanya tentang EPrT, yudisium, SKS, sidang TA, dan syarat kelulusan.
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Tulis pertanyaan kamu...">
            <button id="sendBtn">Kirim</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
