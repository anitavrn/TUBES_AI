<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Virtual Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="app-wrapper">

        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">🤖</span>
                <span class="sidebar-title">SSC Chat</span>
            </div>

            <button id="newChatBtn" class="btn-new-chat">+ Chat Baru</button>

            <div class="history-section">
                <p class="section-label">Riwayat Percakapan</p>
                <ul id="historyList" class="history-list"></ul>
            </div>

            <button id="clearHistoryBtn" class="btn-clear">🗑 Hapus Riwayat</button>
        </aside>

        <div class="chat-wrapper">
            <div class="chat-header">
                <h1>SSC Virtual Assistant</h1>
                <p>Layanan Informasi Akademik Student Service Center</p>
            </div>

            <div id="chatBox" class="chat-box"></div>

            <div class="input-area">
                <input type="text" id="question" placeholder="Tulis pertanyaan kamu...">
                <button id="sendBtn">Kirim</button>
            </div>
        </div>

    </div>

    <script src="/static/script.js"></script>
</body>

</html>
